repos:
- hooks:
  - id: ruff
  - id: ruff-format
    args: [--check, --diff]
  repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.11.4
- hooks:
  - id: commitizen
    stages:
    - pre-push
  repo: https://github.com/commitizen-tools/commitizen
  rev: v4.5.0
- repo: https://github.com/astral-sh/uv-pre-commit
  # uv version.
  rev: 0.11.8
  hooks:
    - id: uv-audit